# F9 AVM Template Pack — Chiller
#
# Su soğutmalı chiller ünitesi. AVM HVAC ana soğutma kaynağı.
# Saha keşfinde birden fazla chiller varsa ayrı instance oluşturulur
# (instance isimlendirme W5'te). Role anahtarları generic — gerçek tag
# adları binding wizard'da atanır.

slug: chiller
name: Chiller
description: Su soğutmalı chiller ünitesi (AVM HVAC ana soğutma)
icon: activity

roles:
  - role_key: supply_temp
    label: Evaporatör Gidiş Sıcaklığı
    unit_hint: °C
    required: true
    sort_order: 1
  - role_key: return_temp
    label: Evaporatör Dönüş Sıcaklığı
    unit_hint: °C
    required: true
    sort_order: 2
  - role_key: compressor_current
    label: Kompresör Akımı
    unit_hint: A
    required: true
    sort_order: 3
  - role_key: flow_rate
    label: Evaporatör Debi
    unit_hint: m³/h
    required: false
    sort_order: 4
  - role_key: active_power_kw
    label: Aktif Güç (Elektrik)
    unit_hint: kW
    required: false
    sort_order: 5
  - role_key: condenser_supply_temp
    label: Kondenser Gidiş Sıcaklığı
    unit_hint: °C
    required: false
    sort_order: 6
  - role_key: condenser_return_temp
    label: Kondenser Dönüş Sıcaklığı
    unit_hint: °C
    required: false
    sort_order: 7
  - role_key: ambient_temp
    label: Ortam Sıcaklığı
    unit_hint: °C
    required: false
    sort_order: 8

kpis:
  - name: delta_t
    formula: return_temp - supply_temp
    unit: °C
    description: Evaporatör gidiş-dönüş sıcaklık farkı
  - name: cooling_capacity_kw
    formula: flow_rate * 4.186 * (return_temp - supply_temp) / 3.6
    unit: kW
    description: Anlık soğutma kapasitesi (su cp=4.186 kJ/kg.K, debi m³/h)
  - name: cop
    formula: flow_rate * 4.186 * (return_temp - supply_temp) / 3.6 / active_power_kw
    unit: ratio
    description: Gerçek COP (cooling_capacity / aktif güç)
  - name: cop_proxy
    formula: (return_temp - supply_temp) / compressor_current
    unit: °C/A
    description: Enerji sayacı yoksa kullanılan yaklaşık COP göstergesi

alarm_defaults:
  - role_key: supply_temp
    direction: high
    set_point: 14.0
    severity: warn
    debounce_seconds: 120
    hysteresis: 0.5
    description: Evaporatör gidiş suyu yükseldi — kapasite düşüyor olabilir
  - role_key: compressor_current
    direction: high
    set_point: 95.0
    severity: crit
    debounce_seconds: 30
    hysteresis: 2.0
    description: Kompresör yüksek akım — aşırı yük koruması devreye girebilir
  - role_key: condenser_return_temp
    direction: high
    set_point: 45.0
    severity: warn
    debounce_seconds: 120
    hysteresis: 1.0
    description: Kondenser dönüş suyu yüksek — fan veya cooling tower problemi

maintenance_defaults:
  - title: Evaporatör ve kondenser filtre kontrolü
    period_days: 90
    description: Filtre tıkanıklığı ve fark basınç kontrolü
  - title: Kompresör yağ seviyesi ve sızıntı kontrolü
    period_days: 30
    description: Yağ seviye gözleri + gözle sızıntı kontrolü
  - title: Antifriz/glikol konsantrasyon testi
    period_days: 365
    description: Evaporatör devresi glikol yüzdesi ve pH
