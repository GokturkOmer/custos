name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Bagimliliklari kur
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Mypy tip kontrolu
        run: mypy src/ --ignore-missing-imports

      - name: Pytest
        run: pytest tests/dashboard/ -v
