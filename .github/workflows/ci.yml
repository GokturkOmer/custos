name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Bagimliliklari kur
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Custos mimari kurallari
        run: python scripts/architecture_check.py

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Mypy tip kontrolu
        run: mypy src/ --ignore-missing-imports

      # H9 (31 May 2026 review): CI eskiden yalnız tests/dashboard/ koşuyordu;
      # collector decode, threshold çekirdeği, KPI sandbox gibi pilot-kritik
      # mantık CI'da hiç doğrulanmıyordu. tests/unit/ DB gerektirmez → sıfır
      # altyapıyla eklenir. (Integration/load + TimescaleDB service ayrı bir
      # adımda eklenebilir; bkz. review H9.)
      - name: Pytest (unit — DB gerektirmez)
        run: pytest tests/unit/ -v

      - name: Pytest (dashboard)
        run: pytest tests/dashboard/ -v
