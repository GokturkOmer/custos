name: Security Audit

# PP-02 (29 Nis 2026): Bagimlilik guvenlik taramasi.
# Haftalik cron + manuel tetikleyici + lockfile/pyproject degisikliginde PR.

on:
  schedule:
    # Pazartesi 06:00 UTC = 09:00 Turkiye saati.
    - cron: "0 6 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "requirements.lock"
      - "pyproject.toml"
      - ".github/workflows/security.yml"

jobs:
  pip-audit:
    name: pip-audit (lockfile)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: pip-audit kurulum
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Bagimlilik guvenlik taramasi
        run: |
          # torch==2.11.0+cpu PyPI'da yok (CPU wheel pytorch.org'dan geliyor),
          # pip-audit lookup yapamiyor — bu satirlari hariç tut.
          grep -v -E '^(torch==2|--extra-index)' requirements.lock > /tmp/audit_targets.txt

          # transformers CVE-2026-1839: Trainer class kullanilmiyor, sadece
          # sentence-transformers Pipeline (embeddings). PP-01 kabul edilen
          # risk; v1.2'de transformers 5.x major bump planli.
          #
          # pyarrow PYSEC-2026-113 (CVE-2026-25087): Apache Arrow C++ IPC
          # okuma use-after-free'i. PyArrow Python binding pre-buffering'i
          # expose etmiyor (advisory notu) ve archiver.py yalnizca Parquet
          # YAZIYOR (IPC okumuyor) — Custos icin uygulanamaz. Fix surumu
          # 23.0.1 pyproject pyarrow<20.0 sinirini asar; bilincli ignore.
          #
          # transformers PYSEC-2025-217 (CVE-2025-14929): X-CLIP checkpoint
          # conversion deserialization. sentence-transformers embeddings bu
          # yolu cagirmiyor; fix surumu de yok. CVE-2026-1839 ile ayni desen.
          pip-audit -r /tmp/audit_targets.txt --strict \
            --ignore-vuln CVE-2026-1839 \
            --ignore-vuln PYSEC-2026-113 \
            --ignore-vuln PYSEC-2025-217
