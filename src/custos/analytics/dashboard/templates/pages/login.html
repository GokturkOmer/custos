<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — Custos</title>
  <link rel="stylesheet" href="/static/css/dist.css">
</head>
<body class="h-full bg-bg-base text-text-primary font-sans antialiased">
  <div class="min-h-full flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-sm bg-bg-surface border border-border-weak rounded-lg p-6">
      <div class="text-center mb-6">
        <h1 class="text-xl font-semibold tracking-wider text-accent-primary">CUSTOS</h1>
        <p class="text-small text-text-secondary mt-1">Endüstriyel İzleme Sistemi</p>
      </div>

      {% if error == 'invalid' %}
      <div class="mb-4 p-3 bg-status-crit/10 border border-status-crit rounded text-small text-status-crit">
        Kullanıcı adı veya parola hatalı.
      </div>
      {% elif error == 'rate_limited' %}
      <div class="mb-4 p-3 bg-status-crit/10 border border-status-crit rounded text-small text-status-crit">
        Çok fazla başarısız deneme. 15 dakika sonra tekrar deneyin.
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <div>
          <label for="username" class="block text-small text-text-secondary mb-1">
            Kullanıcı Adı
          </label>
          <input
            id="username"
            name="username"
            type="text"
            required
            autocomplete="username"
            autofocus
            class="w-full px-3 py-2 bg-bg-base border border-border-weak rounded
                   focus:outline-none focus:border-accent-primary
                   text-body text-text-primary"
          >
        </div>

        <div>
          <label for="password" class="block text-small text-text-secondary mb-1">
            Parola
          </label>
          <input
            id="password"
            name="password"
            type="password"
            required
            autocomplete="current-password"
            class="w-full px-3 py-2 bg-bg-base border border-border-weak rounded
                   focus:outline-none focus:border-accent-primary
                   text-body text-text-primary"
          >
        </div>

        <button
          type="submit"
          class="w-full px-4 py-2 bg-accent-primary text-white font-medium rounded
                 hover:bg-accent-primary/90 transition-colors"
        >
          Giriş
        </button>
      </form>
    </div>
  </div>
</body>
</html>
