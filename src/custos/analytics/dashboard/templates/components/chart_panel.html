{# uPlot grafik container macro'su #}
{% macro chart_panel(title, chart_id, height=200, editable=false) %}
<div class="bg-bg-surface rounded-sm border border-border-weak p-4">
  <div class="flex items-center justify-between mb-3">
    <h3 class="text-panel-title text-text-primary">{{ title }}</h3>
    <div class="flex items-center gap-2">
      {% if editable %}
      <button
        hx-get="/dashboard/overview/chart-config/{{ chart_id }}"
        hx-target="#config-{{ chart_id }}"
        hx-swap="innerHTML"
        class="text-text-disabled hover:text-text-primary transition-colors p-1"
        title="Tag sec">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
      </button>
      {% endif %}
      <span class="text-small text-text-disabled">Last 30 min</span>
    </div>
  </div>
  {% if editable %}
  <div id="config-{{ chart_id }}"></div>
  {% endif %}
  <div id="{{ chart_id }}"
       x-data="chartPanel('{{ chart_id }}')"
       x-init="init()"
       data-chart-height="{{ height }}"
       class="w-full">
  </div>
</div>
{% endmacro %}
