{# Sidebar navigasyon item macro'su #}
{% macro sidebar_item(href, icon_name, label, active=false) %}
{% from 'components/icon.html' import icon_inline %}
<a href="{{ href }}"
   class="flex items-center gap-3 px-4 py-2.5 text-body transition-colors
          {{ 'bg-bg-elevated text-text-primary border-l-2 border-accent-primary' if active else 'text-text-secondary hover:text-text-primary hover:bg-bg-elevated border-l-2 border-transparent' }}">
  {{ icon_inline(icon_name, class='w-4 h-4 flex-shrink-0') }}
  <span>{{ label }}</span>
</a>
{% endmacro %}
