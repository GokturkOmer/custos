title: "Chiller sıkça sorulan sorular"
category: ekipman
asset_template: chiller
tags: [chiller, sss, temel]
items:
  - q: "Chiller nedir?"
    a: >
      Soğutma sistemlerinde akışkanın ısısını alan merkezi ekipmandır.
      Tipik olarak kompresör, kondenser, evaporatör ve genleşme valfinden
      oluşur. AVM'lerde klima santrallerine soğuk su besler.

  - q: "Chiller alarm verirse ne yapmalıyım?"
    a: >
      Önce alarm tipini Custos alarmlar sayfasında oku. Basınç alarmıysa
      kondenser fanlarını ve yüzey kirliliğini kontrol et. Sıcaklık
      alarmıysa refrigerant seviyesine bak. Emin değilsen yetkili servisi
      ara — Custos otomatik müdahale yapmaz.

  - q: "Kondenser temizliği ne sıklıkla yapılmalı?"
    a: >
      Kullanım yoğunluğuna bağlı olarak 30-90 gün aralığında görsel
      inceleme; belirgin kirlilik varsa basınçlı su ile temizlik.
      AVM için tipik periyot 30 gün (yaz), 60 gün (kış).
