# Custos Wind Pivot — Wind Turbine v1 asset template
#
# Faz 1.1 (2026-05-12). Fraunhofer CARE dataset (Wind Farm A — Portekiz onshore)
# uzerinden cikartilmis tipik 2-3 MW class onshore rolling-bearing turbin
# sablonu. 54 unique sensor type'tan Custos'a 200 tag limiti icinde tum
# Farm A kolonlari sigar (81 tag); template "must-have" 10 rol uzerinde
# soyutlar. Diger sensorler tag olarak DB'ye girer ama role'e baglanmaz —
# anomaly/SPC/cross-sensor kurallarinda kullanilabilir.
#
# Format: F9 AVM Template Pack ile birebir uyumlu (HVAC YAML deseni).
# Brief'te `.json` istenmisti; mevcut Custos loader sadece YAML okur
# (analytics/templates/loader.py, .yaml glob). YAML formatinda yaziyoruz.
#
# Operational state kavrami (Fraunhofer status_type_id 0-5):
#   0=Normal, 1=Derated, 2=Idling, 3=Service, 4=Downtime, 5=Other.
# Bu, mevcut asset_instances.operating_mode enum'una (running/startup/
# shutdown/idle) Faz 2'de eslenecek; sablon bu eslemeyi description'da
# tasir, DB sema degisikligi YOK (mevcut 4-tier korunur).
#
# YUKLEME KOMUTU (production custos DB'sine YAZILMAMASI icin --dir SART):
#   set -a && source _personal/wind_pivot/.env.wind && set +a && \
#       python scripts/seed_asset_templates.py --dir data/asset_templates
# .env.wind yuklendigi icin POSTGRES_DB=custos_wind, sadece wind DB'ye yazilir.

slug: wind_turbine_v1
name: Rüzgar Türbini (Onshore 2-3 MW)
description: >-
  Onshore rolling-bearing rüzgar türbini şablonu. Fraunhofer CARE Wind Farm A
  (Portekiz EDP-open data tabanlı) referansı; 86 SCADA kolonu (54 unique
  sensör, 10 dk aggregate). Pilot türbinler için tag bağlama wizard'ında
  rol yuvaları doldurulur.
icon: wind

roles:
  - role_key: rotor_rpm
    label: Rotor RPM (Düşük Hız Şaftı)
    unit_hint: rpm
    required: true
    sort_order: 1
  - role_key: generator_rpm
    label: Jeneratör RPM (Yüksek Hız Şaftı)
    unit_hint: rpm
    required: true
    sort_order: 2
  - role_key: grid_power_kw
    label: Şebeke Aktif Gücü
    unit_hint: kW
    required: true
    sort_order: 3
  - role_key: wind_speed
    label: Rüzgar Hızı (Nasel Anemometresi)
    unit_hint: m/s
    required: true
    sort_order: 4
  - role_key: gearbox_oil_temp
    label: Dişli Kutusu Yağ Sıcaklığı
    unit_hint: °C
    required: true
    sort_order: 5
  - role_key: gearbox_bearing_temp
    label: Dişli Kutusu Yüksek Hız Şaftı Yatak Sıcaklığı
    unit_hint: °C
    required: true
    sort_order: 6
  - role_key: generator_bearing_de_temp
    label: Jeneratör Yatak Sıcaklığı (Drive End)
    unit_hint: °C
    required: false
    sort_order: 7
  - role_key: generator_bearing_nde_temp
    label: Jeneratör Yatak Sıcaklığı (Non-Drive End)
    unit_hint: °C
    required: false
    sort_order: 8
  - role_key: hv_transformer_temp
    label: HV Trafo Sıcaklığı (Faz L1)
    unit_hint: °C
    required: false
    sort_order: 9
  - role_key: hydraulic_oil_temp
    label: Hidrolik Grup Yağ Sıcaklığı
    unit_hint: °C
    required: false
    sort_order: 10
  - role_key: ambient_temp
    label: Ortam Sıcaklığı
    unit_hint: °C
    required: false
    sort_order: 11
  - role_key: nacelle_temp
    label: Nasel İçi Sıcaklık
    unit_hint: °C
    required: false
    sort_order: 12
  - role_key: pitch_angle
    label: Pala Açısı (Pitch)
    unit_hint: °
    required: false
    sort_order: 13
  - role_key: nacelle_direction
    label: Nasel Yönü (Yaw)
    unit_hint: °
    required: false
    sort_order: 14

kpis:
  - name: power_per_wind_cubed
    formula: grid_power_kw / (wind_speed * wind_speed * wind_speed)
    unit: kW/(m/s)³
    description: >-
      Aerodinamik verim proxy'si — sabit hava yoğunluğunda P ≈ ρ·A·v³·Cp/2.
      Bu oran Cp katsayısının ölçek-bağımsız hâli; normal aralıktan sapma
      pitch/yaw misalignment veya pala kirliliği işaretidir.
  - name: gearbox_delta_temp
    formula: gearbox_bearing_temp - gearbox_oil_temp
    unit: °C
    description: >-
      Dişli yatak ile yağ sıcaklığı farkı. Normalde 5-15°C; artış yatak
      sürtünmesi veya yağ sirkülasyon problemi belirtisidir.
  - name: generator_bearing_imbalance
    formula: generator_bearing_de_temp - generator_bearing_nde_temp
    unit: °C
    description: >-
      Drive-end ile non-drive-end yatak arası fark. Sürekli >10°C ise yatak
      aşınması veya yağlama dengesizliği erken sinyali.
  - name: rotor_to_generator_ratio
    formula: generator_rpm / rotor_rpm
    unit: ratio
    description: >-
      Dişli oranı doğrulaması — sabit olmalı (typ. 90-120). Sapma kavrama
      kayması, encoder hatası veya dişli arızası işaretidir.

alarm_defaults:
  - role_key: gearbox_oil_temp
    direction: high
    set_point: 75.0
    severity: warn
    debounce_seconds: 300
    hysteresis: 2.0
    description: Dişli kutusu yağ sıcaklığı yüksek — yağ pompası veya soğutucu kontrolü
  - role_key: gearbox_oil_temp
    direction: high
    set_point: 85.0
    severity: crit
    debounce_seconds: 120
    hysteresis: 2.0
    description: Dişli yağı kritik sıcaklık — derhal yük azaltma / durdurma
  - role_key: gearbox_bearing_temp
    direction: high
    set_point: 85.0
    severity: warn
    debounce_seconds: 300
    hysteresis: 2.0
    description: Dişli yatak sıcaklığı yüksek — titreşim/sürtünme artışı olası
  - role_key: gearbox_bearing_temp
    direction: high
    set_point: 95.0
    severity: crit
    debounce_seconds: 60
    hysteresis: 2.0
    description: Dişli yatak kritik sıcaklık — yatak hasarı riski
  - role_key: generator_bearing_de_temp
    direction: high
    set_point: 90.0
    severity: warn
    debounce_seconds: 300
    hysteresis: 2.0
    description: Jeneratör yatak (DE) sıcaklığı yüksek
  - role_key: generator_bearing_nde_temp
    direction: high
    set_point: 90.0
    severity: warn
    debounce_seconds: 300
    hysteresis: 2.0
    description: Jeneratör yatak (NDE) sıcaklığı yüksek
  - role_key: hv_transformer_temp
    direction: high
    set_point: 90.0
    severity: warn
    debounce_seconds: 600
    hysteresis: 3.0
    description: HV trafo sıcaklığı yüksek — havalandırma/yük kontrolü
  - role_key: hv_transformer_temp
    direction: high
    set_point: 110.0
    severity: crit
    debounce_seconds: 120
    hysteresis: 3.0
    description: HV trafo kritik — yalıtım hasarı riski
  - role_key: hydraulic_oil_temp
    direction: high
    set_point: 70.0
    severity: warn
    debounce_seconds: 300
    hysteresis: 2.0
    description: Hidrolik yağ sıcak — soğutma fanı kontrolü
  - role_key: rotor_rpm
    direction: high
    set_point: 22.0
    severity: warn
    debounce_seconds: 30
    hysteresis: 0.5
    description: Rotor aşırı hız — pitch kontrol gözlem (typ. 6-19 rpm)
  - role_key: generator_rpm
    direction: high
    set_point: 2100.0
    severity: warn
    debounce_seconds: 30
    hysteresis: 20.0
    description: Jeneratör aşırı hız (typ. 1500-1800 rpm) — overspeed limit
  - role_key: wind_speed
    direction: high
    set_point: 25.0
    severity: warn
    debounce_seconds: 60
    hysteresis: 1.0
    description: Cut-out hızı yaklaştı — pitch'i feathering'e alma beklenir
  - role_key: nacelle_temp
    direction: high
    set_point: 50.0
    severity: warn
    debounce_seconds: 600
    hysteresis: 2.0
    description: Nasel içi yüksek sıcaklık — havalandırma fanı veya yangın riski

maintenance_defaults:
  - title: Dişli kutusu yağ analizi (numune)
    period_days: 180
    description: Yağ kalitesi, parçacık sayımı, su muhtevası laboratuvar testi
  - title: Pala görsel kontrol (drone veya yer)
    period_days: 365
    description: Yıpranma, çatlak, kenar erozyonu, ışık reflektör kontrolü
  - title: Yaw motor ve sürücü kontrolü
    period_days: 180
    description: Yaw bearing yağlama, motor akım testi, encoder kalibrasyonu
  - title: Pitch sistem hidrolik basınç testi
    period_days: 365
    description: Hidrolik basınç, akümülatör nitrojen ön-yükü, pitch sürücü PLC log
  - title: HV trafo silikajeli ve yağ seviyesi kontrolü
    period_days: 180
    description: Silikajel rengi (nem göstergesi), yağ seviye gözü, kaçak izi
  - title: Jeneratör yatak yağlama (otomatik gres dolumu)
    period_days: 90
    description: Otomatik gres dağıtıcı haznesi, blokaj kontrolü, eski gres tahliyesi
  - title: Tower bolt-tightness denetimi
    period_days: 730
    description: Tower flanş cıvataları tork kontrolü (2 yılda 1, ilk yıl 6 ay sonra)

# Wind pivot Faz 2 Prompt 2 (2026-05-12) cross-sensor cok-tag kurallari.
#
# Tek-sensör threshold (alarm_defaults) sadece bir kanali izler; gerçek
# arizalar genellikle iki+ sensörün birlikte sapmasiyla erken sinyal verir.
# Faz 1.5 paradoksu: Hidrolik 6 event'inden 5'i, mekanik bearing 5
# event'inden 4'u sadece spike threshold'u astıkdan sonra (saat-gun sonra)
# yakalandı. Bu kurallar Hoinka/EnBW prensibinin pratik uygulamasi —
# "tek sensör spike yerine kombo trend".
#
# tag_name konvansiyonu: seed_wind_tags.py 'wind_t_*' standardini takip
# eder. Template role_key'leri kullanmaz cunku stat-tag'lar (std/max/min)
# role olarak tanimli degildir (must-have semantigini bozar — bunlar
# anomaly + cross-sensor icin gerekli ama operator'in bilmesi gerekmiyor).
#
# Severity politikasi (CLAUDE feedback_alarm_critical_policy ile uyumlu):
# cross_sensor user-defined oldugu icin 'crit' izinli; kritik mekanik
# (stator/transformer/bearing kombo) crit, geri kalani warn.

cross_sensor_rules:
  - rule_id: hyd_overheat_pitch_instability
    description: >-
      Hidrolik yağ sıcaklığı yükselirken pitch kontrol salınımı artıyor
      → pitch hidrolik basıncı zayıflıyor. Faz 1.5'te 2 hidrolik event'i
      bu kombinasyon ile 18 saat erken yakalanabilirdi.
    severity: warn
    window_min: 30
    require_all: true
    tag_conditions:
      - tag_name: wind_t_hydraulic_oil_temp
        op: gt
        threshold: 65.0
      - tag_name: wind_t_pitch_angle_std
        op: gt
        threshold: 2.0
  - rule_id: hyd_overheat_under_load
    description: >-
      Yük altında (>500 kW) hidrolik yağ sıcaklığı yükselip pitch açıkken
      → hidrolik akümülatör doluş kaybı. Salt sıcaklık 70°C alarmı geç
      kalır; yük + pitch kontekstiyle 1 gün önce tetiklenir.
    severity: warn
    window_min: 30
    require_all: true
    tag_conditions:
      - tag_name: wind_t_hydraulic_oil_temp
        op: gt
        threshold: 60.0
      - tag_name: wind_t_grid_power_avg
        op: gt
        threshold: 500.0
      - tag_name: wind_t_pitch_angle_avg
        op: gt
        threshold: 5.0
  - rule_id: gen_bearing_overheat_vibration
    description: >-
      Jeneratör yatak DE + NDE birlikte ısınırken RPM std artıyor
      → klasik yatak aşınması imzası (vibration proxy). Event 0 (Asset 0)
      bu kombo ile 36 saat önce; Event 40 (Asset 10) global threshold ile
      4.5 gün geç yakalanmıştı.
    severity: crit
    window_min: 30
    require_all: true
    tag_conditions:
      - tag_name: wind_t_gen_bearing_de_temp
        op: gt
        threshold: 75.0
      - tag_name: wind_t_gen_bearing_nde_temp
        op: gt
        threshold: 75.0
      - tag_name: wind_t_generator_rpm_std
        op: gt
        threshold: 50.0
  - rule_id: gen_bearing_de_asymmetry
    description: >-
      DE yatak yalnız başına yüksek, NDE serin → tek-tarafli yatak
      dengesizliği (kavrama veya hizalama). RPM normal aralıkta;
      sadece sıcaklık asimetrisi.
    severity: warn
    window_min: 30
    require_all: true
    tag_conditions:
      - tag_name: wind_t_gen_bearing_de_temp
        op: gt
        threshold: 80.0
      - tag_name: wind_t_gen_bearing_nde_temp
        op: lt
        threshold: 70.0
  - rule_id: gearbox_oil_bearing_load_combo
    description: >-
      Dişli yağı + yatak sıcaklığı + rotor RPM (yük göstergesi) üçlüsü.
      Yağ zayıflarken yatak ısınıyor ve makine hala yükte → soğutma /
      yağlama hattı tıkanıklığı.
    severity: crit
    window_min: 30
    require_all: true
    tag_conditions:
      - tag_name: wind_t_gearbox_oil_temp
        op: gt
        threshold: 70.0
      - tag_name: wind_t_gearbox_hss_bearing_temp
        op: gt
        threshold: 78.0
      - tag_name: wind_t_rotor_rpm_avg
        op: gt
        threshold: 10.0
  - rule_id: transformer_3phase_overheat
    description: >-
      HV trafo L1 + L2 + L3 birlikte yüksek → sistemik overheating
      (soğutma fanı arızası veya aşırı yük). Tek-faz yüksekse genellikle
      ölçüm/sensör; 3 faz birlikte = gerçek arıza.
    severity: crit
    window_min: 30
    require_all: true
    tag_conditions:
      - tag_name: wind_t_hv_transformer_l1_temp
        op: gt
        threshold: 90.0
      - tag_name: wind_t_hv_transformer_l2_temp
        op: gt
        threshold: 90.0
      - tag_name: wind_t_hv_transformer_l3_temp
        op: gt
        threshold: 90.0
  - rule_id: stator_3phase_overheat
    description: >-
      Stator faz 1 + 2 + 3 birlikte yüksek → sargı yalıtım risk
      (insulation class H typ 130°C max; 110°C erken sinyal).
    severity: crit
    window_min: 30
    require_all: true
    tag_conditions:
      - tag_name: wind_t_gen_stator_phase1_temp
        op: gt
        threshold: 110.0
      - tag_name: wind_t_gen_stator_phase2_temp
        op: gt
        threshold: 110.0
      - tag_name: wind_t_gen_stator_phase3_temp
        op: gt
        threshold: 110.0
  - rule_id: igbt_rotor_3phase_overheat
    description: >-
      Converter rotor-side IGBT 3 fazi birlikte ısınıyor → DFIG
      converter sıcaklık problemi (su soğutma veya yarı-iletken aşınma).
    severity: warn
    window_min: 30
    require_all: true
    tag_conditions:
      - tag_name: wind_t_igbt_rotor_inv_ph1_temp
        op: gt
        threshold: 80.0
      - tag_name: wind_t_igbt_rotor_inv_ph2_temp
        op: gt
        threshold: 80.0
      - tag_name: wind_t_igbt_rotor_inv_ph3_temp
        op: gt
        threshold: 80.0
  - rule_id: cooling_loop_degradation
    description: >-
      VCS soğutma suyu ısınıyor + grid-side IGBT de ısınıyor → soğutma
      kapasitesi düşüyor (pompa, fan veya hidrolik blokaj). Tek sıcaklık
      eşiğinden 2-3 gün önce tetiklenir.
    severity: warn
    window_min: 30
    require_all: true
    tag_conditions:
      - tag_name: wind_t_vcs_cooling_water_temp
        op: gt
        threshold: 55.0
      - tag_name: wind_t_igbt_grid_inv_temp
        op: gt
        threshold: 75.0
  - rule_id: rotor_mechanical_imbalance
    description: >-
      Rotor RPM std + pitch std yüksek, rüzgar turbulansı düşük →
      makineden kaynaklı dengesizlik (rüzgardan değil). Bu kombo
      mekanik bearing veya kanat aerodynamic problemine erken sinyal.
    severity: warn
    window_min: 30
    require_all: true
    tag_conditions:
      - tag_name: wind_t_rotor_rpm_std
        op: gt
        threshold: 1.5
      - tag_name: wind_t_pitch_angle_std
        op: gt
        threshold: 3.0
      - tag_name: wind_t_wind_speed_std
        op: lt
        threshold: 2.0
